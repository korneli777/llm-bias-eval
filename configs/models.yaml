# Central model registry. Every script reads from this file.
# 22 base ↔ instruct pairs = 44 checkpoints across 4 families.
# All models load in full bfloat16 — no quantization.

families:
  llama:
    display_name: "Llama"
    vendor: "Meta"
    requires_hf_auth: true
    generations:
      - name: "Llama 2"
        release_date: "2023-07"
        models:
          - size: "7B"
            base_id: "meta-llama/Llama-2-7b-hf"
            instruct_id: "meta-llama/Llama-2-7b-chat-hf"
            num_params: 7_000_000_000
            num_layers: 32
            hidden_size: 4096
            dtype: "bfloat16"
      - name: "Llama 3"
        release_date: "2024-04"
        models:
          - size: "8B"
            base_id: "meta-llama/Meta-Llama-3-8B"
            instruct_id: "meta-llama/Meta-Llama-3-8B-Instruct"
            num_params: 8_000_000_000
            num_layers: 32
            hidden_size: 4096
            dtype: "bfloat16"
      - name: "Llama 3.1"
        release_date: "2024-07"
        models:
          - size: "8B"
            base_id: "meta-llama/Llama-3.1-8B"
            instruct_id: "meta-llama/Llama-3.1-8B-Instruct"
            num_params: 8_000_000_000
            num_layers: 32
            hidden_size: 4096
            dtype: "bfloat16"
      - name: "Llama 3.2"
        release_date: "2024-09"
        models:
          - size: "1B"
            base_id: "meta-llama/Llama-3.2-1B"
            instruct_id: "meta-llama/Llama-3.2-1B-Instruct"
            num_params: 1_000_000_000
            num_layers: 16
            hidden_size: 2048
            dtype: "bfloat16"
          - size: "3B"
            base_id: "meta-llama/Llama-3.2-3B"
            instruct_id: "meta-llama/Llama-3.2-3B-Instruct"
            num_params: 3_000_000_000
            num_layers: 28
            hidden_size: 3072
            dtype: "bfloat16"

  qwen:
    display_name: "Qwen"
    vendor: "Alibaba"
    requires_hf_auth: false
    notes: "Qwen3 inverts the naming convention: -Base = base, no suffix = instruct."
    generations:
      - name: "Qwen 2.5"
        release_date: "2024-09"
        models:
          - size: "1.5B"
            base_id: "Qwen/Qwen2.5-1.5B"
            instruct_id: "Qwen/Qwen2.5-1.5B-Instruct"
            num_params: 1_500_000_000
            num_layers: 28
            hidden_size: 1536
            dtype: "bfloat16"
          - size: "3B"
            base_id: "Qwen/Qwen2.5-3B"
            instruct_id: "Qwen/Qwen2.5-3B-Instruct"
            num_params: 3_000_000_000
            num_layers: 36
            hidden_size: 2048
            dtype: "bfloat16"
          - size: "7B"
            base_id: "Qwen/Qwen2.5-7B"
            instruct_id: "Qwen/Qwen2.5-7B-Instruct"
            num_params: 7_000_000_000
            num_layers: 28
            hidden_size: 3584
            dtype: "bfloat16"
          - size: "14B"
            base_id: "Qwen/Qwen2.5-14B"
            instruct_id: "Qwen/Qwen2.5-14B-Instruct"
            num_params: 14_000_000_000
            num_layers: 48
            hidden_size: 5120
            dtype: "bfloat16"
          - size: "32B"
            base_id: "Qwen/Qwen2.5-32B"
            instruct_id: "Qwen/Qwen2.5-32B-Instruct"
            num_params: 32_000_000_000
            num_layers: 64
            hidden_size: 5120
            dtype: "bfloat16"
            notes: "~64GB in bf16, fits on A100 80GB with batch_size=1"
      - name: "Qwen 3"
        release_date: "2025-04"
        models:
          - size: "4B"
            base_id: "Qwen/Qwen3-4B-Base"
            instruct_id: "Qwen/Qwen3-4B"
            num_params: 4_000_000_000
            num_layers: 36
            hidden_size: 2560
            dtype: "bfloat16"
          - size: "8B"
            base_id: "Qwen/Qwen3-8B-Base"
            instruct_id: "Qwen/Qwen3-8B"
            num_params: 8_000_000_000
            num_layers: 36
            hidden_size: 4096
            dtype: "bfloat16"

  gemma:
    display_name: "Gemma"
    vendor: "Google"
    requires_hf_auth: true
    generations:
      - name: "Gemma 1"
        release_date: "2024-02"
        models:
          - size: "2B"
            base_id: "google/gemma-2b"
            instruct_id: "google/gemma-2b-it"
            num_params: 2_000_000_000
            num_layers: 18
            hidden_size: 2048
            dtype: "bfloat16"
