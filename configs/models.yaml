            hidden_size: 3840
            dtype: "bfloat16"
            model_class: "Gemma3ForCausalLM"
      - name: "Gemma 4"
        release_date: "2026-04"
        notes: "Newest generation — load with Gemma4ForCausalLM for text-only mode. VERIFY HF IDs before relying on these (released ~April 2026)."
        models:
          - size: "31B"
            base_id: "google/gemma-4-31B"
            instruct_id: "google/gemma-4-31B-it"
            num_params: 31_000_000_000
            num_layers: 50
            hidden_size: 4608
            dtype: "bfloat16"
            model_class: "Gemma4ForCausalLM"
            notes: "~62GB in bf16, fits on A100 80GB with batch_size=1"

  mistral:
    display_name: "Mistral"
    vendor: "Mistral AI"
    requires_hf_auth: false
    generations:
      - name: "Mistral v0.1"
        release_date: "2023-09"
        models:
          - size: "7B"
            base_id: "mistralai/Mistral-7B-v0.1"
            instruct_id: "mistralai/Mistral-7B-Instruct-v0.1"
            num_params: 7_000_000_000
            num_layers: 32
            hidden_size: 4096
            dtype: "bfloat16"
      - name: "Mistral v0.3"
        release_date: "2024-05"
        models:
          - size: "7B"
            base_id: "mistralai/Mistral-7B-v0.3"
            instruct_id: "mistralai/Mistral-7B-Instruct-v0.3"
            num_params: 7_000_000_000
            num_layers: 32
            hidden_size: 4096
            dtype: "bfloat16"

# Subset for linear probing. One representative pair per family.
# For models >14B, stream activations to disk one layer at a time.
probing_subset:
  - "meta-llama/Llama-2-7b-hf"
  - "meta-llama/Llama-2-7b-chat-hf"
  - "meta-llama/Llama-3.1-8B"
  - "meta-llama/Llama-3.1-8B-Instruct"
  - "Qwen/Qwen2.5-7B"
  - "Qwen/Qwen2.5-7B-Instruct"
  - "google/gemma-2-9b"
  - "google/gemma-2-9b-it"
  - "google/gemma-3-4b-pt"
  - "google/gemma-3-4b-it"
  - "mistralai/Mistral-7B-v0.3"
  - "mistralai/Mistral-7B-Instruct-v0.3"

# Used for the local smoke test — tiny CPU-runnable model.
smoke_test_model: "sshleifer/tiny-gpt2"
