# Subset for linear probing + INLP/LEACE intervention.
# Spans 4-24B (~0.8 orders of magnitude) so the latent-bias-vs-size story
# can be told alongside the output-bias-vs-size regression.
# For models >14B, stream activations to disk one layer at a time.
probing_subset:
  # 4-9B: original cross-family representative pairs
  - "meta-llama/Llama-2-7b-hf"
  - "meta-llama/Llama-2-7b-chat-hf"
  - "meta-llama/Llama-3.1-8B"
  - "meta-llama/Llama-3.1-8B-Instruct"
  - "Qwen/Qwen2.5-7B"
  - "Qwen/Qwen2.5-7B-Instruct"
  - "google/gemma-2-9b"
  - "google/gemma-2-9b-it"
  - "google/gemma-3-4b-pt"
  - "google/gemma-3-4b-it"
  - "mistralai/Mistral-7B-v0.3"
  - "mistralai/Mistral-7B-Instruct-v0.3"
  # 13-24B: extension for size-axis breadth in the probing stage
  - "meta-llama/Llama-2-13b-hf"
  - "meta-llama/Llama-2-13b-chat-hf"
  - "mistralai/Mistral-Small-24B-Base-2501"
  - "mistralai/Mistral-Small-24B-Instruct-2501"

# Used for the local smoke test — tiny CPU-runnable model.
smoke_test_model: "sshleifer/tiny-gpt2"
