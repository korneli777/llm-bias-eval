# Central model registry. Every script reads from this file.
# 33 base ↔ instruct pairs = 66 checkpoints across 4 families.
# All models load in full bfloat16 — no quantization.
# Models ≥70B are intentionally excluded: they don't fit a single H100/A100
# in bf16 and quantizing only the largest would introduce a confound.

families:
  llama:
    display_name: "Llama"
    vendor: "Meta"
    requires_hf_auth: true
    generations:
      - name: "Llama 2"
        release_date: "2023-07"
        models:
          - size: "7B"
            base_id: "meta-llama/Llama-2-7b-hf"
            instruct_id: "meta-llama/Llama-2-7b-chat-hf"
            num_params: 7_000_000_000
            num_layers: 32
            hidden_size: 4096
            dtype: "bfloat16"
          - size: "13B"
            base_id: "meta-llama/Llama-2-13b-hf"
            instruct_id: "meta-llama/Llama-2-13b-chat-hf"
            num_params: 13_000_000_000
            num_layers: 40
            hidden_size: 5120
            dtype: "bfloat16"
